name: Build & Push Production Images

on:
  push:
    tags: ['v*']         # Triggered by version tags: v1.0.0, v1.1.0, etc.
  workflow_dispatch:     # Manual trigger for Ollama or ad-hoc builds
    inputs:
      build_ollama:
        description: 'Build Ollama image (large — run only when model changes)'
        required: false
        default: 'false'
        type: boolean
      ollama_model:
        description: 'Ollama model tag (e.g. qwen3.5:9b-instruct)'
        required: false
        default: 'qwen3.5:9b-instruct'

env:
  REGISTRY: ghcr.io
      IMAGE_PREFIX: ghcr.io/luketempleman/meridian
  # ─── Build & Push to GHCR (FREE unlimited private repos) ───────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: api
            dockerfile: docker/Dockerfile.api.prod
            context: .
          - image: frontend
            dockerfile: docker/Dockerfile.frontend.prod
            context: .
          - image: worker
            dockerfile: docker/Dockerfile.worker.prod
            context: .

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME:-latest}" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Build Ollama image (manual trigger only — large build) ────────────────
  build-ollama:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.event.inputs.build_ollama == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Ollama
        run: |
          MODEL_TAG=$(echo "${{ github.event.inputs.ollama_model }}" | tr ':' '-' | tr '.' '-')
          docker build \
            -f docker/Dockerfile.ollama \
            --build-arg MODEL_NAME=${{ github.event.inputs.ollama_model }} \
            -t ${{ env.IMAGE_PREFIX }}-ollama:${MODEL_TAG} \
            -t ${{ env.IMAGE_PREFIX }}-ollama:latest \
            .
          docker push ${{ env.IMAGE_PREFIX }}-ollama:${MODEL_TAG}
          docker push ${{ env.IMAGE_PREFIX }}-ollama:latest
