name: Tests

on: [push, pull_request]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: meridian_test
          POSTGRES_USER: meridian
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r api/requirements.txt
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://meridian:test@localhost:5432/meridian_test
          DATABASE_URL_SYNC: postgresql://meridian:test@localhost:5432/meridian_test
        run: alembic upgrade head
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://meridian:test@localhost:5432/meridian_test
          DATABASE_URL_SYNC: postgresql://meridian:test@localhost:5432/meridian_test
          REDIS_URL: redis://localhost:6379/0
          LLM_PROVIDER: ollama_cloud
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          AUTH_MODE: local
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: meridian
          MINIO_SECRET_KEY: testing
        run: pytest tests/ -v --tb=short -q

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build

  licence-worker:
    name: Licence Worker Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        working-directory: cloudflare/licence-worker
        run: npm ci
      - name: Run tests
        working-directory: cloudflare/licence-worker
        run: npm test
