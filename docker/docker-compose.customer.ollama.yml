# =========================================================
# Meridian Platform — Tier 2 Ollama Overlay
# Merge with docker-compose.customer.yml:
#   docker compose -f docker-compose.yml -f docker-compose.ollama.yml up -d
# =========================================================

services:
  ollama:
    image: ghcr.io/entityoz/meridian-ollama:{{MODEL_TAG}}
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # Uncomment to enable NVIDIA GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_data:
