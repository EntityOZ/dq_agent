# =========================================================
# Meridian Platform — Customer Deployment
# Pre-built images only — NO source code, NO build contexts
# Generated by: scripts/package-deployment.sh
# Version:      {{VERSION}}
# Customer:     {{CUSTOMER_NAME}}
# Tier:         {{TIER}}
# =========================================================

services:
  nginx:
    image: ghcr.io/luketempleman/meridian-nginx:{{VERSION}}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Bind-mount certs dir — populated by meridian-deploy.sh for SSL
      - ./nginx/certs:/etc/nginx/certs:ro
      # Optional: bind-mount config to override without rebuilding the image
      # - ./nginx/meridian.conf:/etc/nginx/conf.d/meridian.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - meridian-net
    healthcheck:
      test: ["CMD-SHELL", "nginx -t 2>/dev/null && wget -qO- http://localhost/health > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  api:
    image: ghcr.io/luketempleman/meridian-api:{{VERSION}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    # No ports exposed — API is only reachable via internal Docker network (http://api:8000)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    dns:
      - 8.8.8.8
      - 8.8.4.4

  worker:
    image: ghcr.io/luketempleman/meridian-worker:{{VERSION}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meridian-net
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4

  beat:
    image: ghcr.io/luketempleman/meridian-worker:{{VERSION}}
    command: ["celery", "-A", "workers.celery_app", "beat", "--loglevel=info"]
    env_file: .env
    depends_on:
      - redis
    networks:
      - meridian-net
    restart: unless-stopped

  frontend:
    image: ghcr.io/luketempleman/meridian-frontend:{{VERSION}}
    expose:
      - "3000"
    env_file: .env
    environment:
      - AUTH_MODE=${AUTH_MODE:-local}
      - NEXT_PUBLIC_AUTH_MODE=${AUTH_MODE:-local}
    depends_on:
      - api
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://0.0.0.0:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=meridian
      - POSTGRES_USER=meridian
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:

networks:
  meridian-net:
    driver: bridge
