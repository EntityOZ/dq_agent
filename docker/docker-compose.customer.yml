# =========================================================
# Meridian Platform — Customer Deployment
# Pre-built images only — NO source code, NO build contexts
# Generated by: scripts/package-deployment.sh
# Version:      {{VERSION}}
# Customer:     {{CUSTOMER_NAME}}
# Tier:         {{TIER}}
# =========================================================

services:
  api:
    image: meridianplatform/api:{{VERSION}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    dns:
      - 8.8.8.8
      - 8.8.4.4

  worker:
    image: meridianplatform/worker:{{VERSION}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meridian-net
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4

  beat:
    image: meridianplatform/worker:{{VERSION}}
    command: ["celery", "-A", "workers.celery_app", "beat", "--loglevel=info"]
    env_file: .env
    depends_on:
      - redis
    networks:
      - meridian-net
    restart: unless-stopped

  frontend:
    image: meridianplatform/frontend:{{VERSION}}
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://0.0.0.0:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=meridian
      - POSTGRES_USER=meridian
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:

networks:
  meridian-net:
    driver: bridge
