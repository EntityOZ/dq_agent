# =============================================================================
# Meridian Platform — nginx reverse proxy config
# Embedded in the meridian-nginx image at build time.
# Can also be bind-mounted at runtime to override without rebuilding.
#
# Routing:
#   /api/*          → api:8000      (FastAPI — direct)
#   /health         → api:8000      (external monitoring)
#   /docs           → api:8000      (FastAPI OpenAPI UI)
#   /openapi.json   → api:8000
#   /minio-console/ → minio:9001    (MinIO admin console)
#   /*              → frontend:3000 (Next.js)
#
# SSL: HTTP-only by default. meridian-deploy.sh activates HTTPS
# by uncommenting the second server block during install.
# =============================================================================

upstream api_upstream {
    server api:8000;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:3000;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# HTTP — port 80
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection       "1; mode=block"                   always;

    # API — direct to FastAPI, bypasses Next.js entirely
    location /api/ {
        proxy_pass          http://api_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Host                $host;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto   $scheme;
        proxy_set_header    Connection          "";
        client_max_body_size    100m;
        proxy_read_timeout      300s;
        proxy_send_timeout      300s;
        proxy_connect_timeout   10s;
    }

    location = /health {
        proxy_pass          http://api_upstream/health;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
        access_log          off;
    }

    location /docs {
        proxy_pass          http://api_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Host        $host;
        proxy_set_header    Connection  "";
    }

    location = /openapi.json {
        proxy_pass          http://api_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
    }

    # MinIO console — restrict to admin IPs in production:
    # allow 10.0.0.0/8;
    # deny  all;
    location /minio-console/ {
        proxy_pass          http://minio:9001/;
        proxy_http_version  1.1;
        proxy_set_header    Host                $host;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    Upgrade             $http_upgrade;
        proxy_set_header    Connection          "upgrade";
    }

    # Next.js frontend — catch-all
    location / {
        proxy_pass          http://frontend_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Host                $host;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto   $scheme;
        proxy_set_header    Upgrade             $http_upgrade;
        proxy_set_header    Connection          "upgrade";
        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — port 443
# MERIDIAN_HTTPS_BEGIN
# Commented by default. meridian-deploy.sh activates this block
# by stripping the leading "##HTTPS## " prefix from each line.
# Do NOT change the prefix — the sed command in the install script depends on it.
# ---------------------------------------------------------------------------
##HTTPS## server {
##HTTPS##     listen 443 ssl;
##HTTPS##     server_name _;
##HTTPS## 
##HTTPS##     ssl_certificate         /etc/nginx/certs/fullchain.pem;
##HTTPS##     ssl_certificate_key     /etc/nginx/certs/privkey.pem;
##HTTPS##     ssl_protocols           TLSv1.2 TLSv1.3;
##HTTPS##     ssl_ciphers             HIGH:!aNULL:!MD5;
##HTTPS##     ssl_session_cache       shared:SSL:10m;
##HTTPS##     ssl_session_timeout     10m;
##HTTPS##     ssl_prefer_server_ciphers on;
##HTTPS## 
##HTTPS##     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
##HTTPS##     add_header X-Frame-Options        "SAMEORIGIN"                      always;
##HTTPS##     add_header X-Content-Type-Options "nosniff"                         always;
##HTTPS##     add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
##HTTPS## 
##HTTPS##     location /api/ {
##HTTPS##         proxy_pass          http://api_upstream;
##HTTPS##         proxy_http_version  1.1;
##HTTPS##         proxy_set_header    Host                $host;
##HTTPS##         proxy_set_header    X-Real-IP           $remote_addr;
##HTTPS##         proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
##HTTPS##         proxy_set_header    X-Forwarded-Proto   $scheme;
##HTTPS##         proxy_set_header    Connection          "";
##HTTPS##         client_max_body_size    100m;
##HTTPS##         proxy_read_timeout      300s;
##HTTPS##         proxy_send_timeout      300s;
##HTTPS##         proxy_connect_timeout   10s;
##HTTPS##     }
##HTTPS## 
##HTTPS##     location = /health {
##HTTPS##         proxy_pass http://api_upstream/health;
##HTTPS##         proxy_http_version 1.1;
##HTTPS##         proxy_set_header Connection "";
##HTTPS##         access_log off;
##HTTPS##     }
##HTTPS## 
##HTTPS##     location /docs        { proxy_pass http://api_upstream; proxy_http_version 1.1; proxy_set_header Connection ""; }
##HTTPS##     location = /openapi.json { proxy_pass http://api_upstream; proxy_http_version 1.1; proxy_set_header Connection ""; }
##HTTPS## 
##HTTPS##     location /minio-console/ {
##HTTPS##         proxy_pass http://minio:9001/;
##HTTPS##         proxy_http_version 1.1;
##HTTPS##         proxy_set_header Host $host;
##HTTPS##         proxy_set_header Upgrade $http_upgrade;
##HTTPS##         proxy_set_header Connection "upgrade";
##HTTPS##     }
##HTTPS## 
##HTTPS##     location / {
##HTTPS##         proxy_pass          http://frontend_upstream;
##HTTPS##         proxy_http_version  1.1;
##HTTPS##         proxy_set_header    Host                $host;
##HTTPS##         proxy_set_header    X-Real-IP           $remote_addr;
##HTTPS##         proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
##HTTPS##         proxy_set_header    X-Forwarded-Proto   $scheme;
##HTTPS##         proxy_set_header    Upgrade             $http_upgrade;
##HTTPS##         proxy_set_header    Connection          "upgrade";
##HTTPS##         proxy_cache_bypass  $http_upgrade;
##HTTPS##         proxy_read_timeout  60s;
##HTTPS##         proxy_connect_timeout 10s;
##HTTPS##     }
##HTTPS## }
# MERIDIAN_HTTPS_END
