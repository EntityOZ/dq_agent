apiVersion: v1
kind: Service
metadata:
  name: {{ include "meridian.fullname" . }}-frontend
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    {{- include "meridian.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
