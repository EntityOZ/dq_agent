version: "3.9"

# =========================================================
# Meridian Platform — Docker Compose
#
# Traffic flow:
#   Browser → Nginx (host, :80/:443)
#          → Next.js :3000 (127.0.0.1)
#          → [Next.js server rewrite] → FastAPI :8000 (Docker network)
#
# The browser NEVER talks directly to port 8000.
# No CORS issues. No IP hardcoding. Works on any domain.
#
# Managed by: sudo systemctl start|stop|restart meridian
# =========================================================

networks:
  meridian-net:
    driver: bridge

volumes:
  db_data:
  redis_data:
  minio_data:
  ollama_data:

services:

  # ── Infrastructure ────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: meridian-db
    environment:
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: meridian
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meridian-redis
    volumes:
      - redis_data:/data
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: meridian-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── AI Model ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: meridian-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Pulls the model once on first install. No-op if already in the volume.
  ollama-init:
    image: ollama/ollama:latest
    container_name: meridian-ollama-init
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - meridian-net
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "qwen2.5:3b"]
    restart: "no"

  # ── API ───────────────────────────────────────────────
  api:
    image: ghcr.io/luketempleman/meridian-api:latest
    platform: linux/amd64
    container_name: meridian-api
    env_file: .env
    # Bound to loopback — only reachable from Next.js on the Docker network
    # and from the host for health checks. Never exposed to the internet.
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Workers ───────────────────────────────────────────
  worker:
    image: ghcr.io/luketempleman/meridian-worker:latest
    platform: linux/amd64
    container_name: meridian-worker
    command: ["celery", "-A", "workers.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meridian-net
    restart: unless-stopped

  beat:
    image: ghcr.io/luketempleman/meridian-worker:latest
    platform: linux/amd64
    container_name: meridian-beat
    command: ["celery", "-A", "workers.celery_app", "beat", "--loglevel=info"]
    env_file: .env
    depends_on:
      - redis
    networks:
      - meridian-net
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────
  frontend:
    image: ghcr.io/luketempleman/meridian-frontend:latest
    platform: linux/amd64
    container_name: meridian-frontend
    env_file: .env
    environment:
      # Server-side only — tells Next.js where to forward /api/* rewrites.
      # Uses Docker DNS to reach the API container by name.
      - INTERNAL_API_URL=http://api:8000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - meridian-net
    restart: unless-stopped
