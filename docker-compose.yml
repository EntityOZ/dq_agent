services:
  api:
    image: ghcr.io/entityoz/meridian/meridian-api:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment: &api-env
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://llm:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:70b}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=postgresql+asyncpg://meridian:${DB_PASSWORD}@db:5432/meridian
      - DATABASE_URL_SYNC=postgresql://meridian:${DB_PASSWORD}@db:5432/meridian
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-meridian}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD}
      - MINIO_BUCKET_UPLOADS=${MINIO_BUCKET_UPLOADS:-meridian-uploads}
      - MINIO_BUCKET_REPORTS=${MINIO_BUCKET_REPORTS:-meridian-reports}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000}
      - LICENCE_KEY=${LICENCE_KEY:-}
      - LICENCE_SERVER_URL=${LICENCE_SERVER_URL:-https://licence.meridian.vantax.co.za}
      - LICENCE_FILE=${LICENCE_FILE:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
      - AUTH_MODE=${AUTH_MODE:-local}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    dns:
      - 8.8.8.8
      - 8.8.4.4

  worker:
    image: ghcr.io/entityoz/meridian/meridian-api:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4
    environment: *api-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "workers.celery_app", "inspect", "ping", "--timeout", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    image: ghcr.io/entityoz/meridian/meridian-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://0.0.0.0:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=meridian
      - POSTGRES_USER=meridian
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # llm service disabled — using host Ollama via host.docker.internal
  # llm:
  #   image: ollama/ollama:latest
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   networks:
  #     - meridian-net
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-meridian}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    ports:
      - "9002:9001"
    networks:
      - meridian-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  # ollama_models:  # disabled — using host Ollama
  minio_data:

networks:
  meridian-net:
    driver: bridge
