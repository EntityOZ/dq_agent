- id: PM028
  field: EQUI.SERNR
  check_class: null_check
  severity: medium
  dimension: completeness
  message: Serial number (equipment) is missing
  why_it_matters: Serial number (equipment) (EQUI.SERNR) is not maintained. This field supports downstream processes and reporting
    accuracy. Missing data may result in incomplete records or processing gaps.
  rule_authority: best_practice
  sap_impact: Missing Serial number (equipment) may cause incomplete data in related transactions and reports.
  fix_map:
    __blank__: 'In ECC: Set via IE02/IL02. In S/4HANA: Use Fiori app F4283 (Manage Equipment) or F4284 (Manage Functional
      Location).'
  record_fix_template: 'Record is missing EQUI.SERNR. In ECC: Set via IE02/IL02. In S/4HANA: Use Fiori app F4283 (Manage Equipment)
    or F4284 (Manage Functional Location).'
