  rule_authority: best_practice
  sap_impact: Missing Sort string may cause incomplete data in related transactions and reports.
  fix_map:
    __blank__: 'In ECC: Set via CA02 (routing) or CS02 (BOM). In S/4HANA: Use the corresponding Fiori apps.'
  record_fix_template: 'Record is missing STPO.SORTF. In ECC: Set via CA02 (routing) or CS02 (BOM). In S/4HANA: Use the corresponding
