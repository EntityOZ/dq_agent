- id: PP026
  field: STPO.SORTF
  check_class: null_check
  severity: low
  dimension: completeness
  message: Sort string is missing
  why_it_matters: Sort string (STPO.SORTF) is not maintained. This field supports downstream processes and reporting accuracy.
