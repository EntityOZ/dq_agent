- id: AP033
  field: LFA1.ERDAT_VENDOR
  check_class: freshness_check
  max_age_hours: 17520
  severity: low
  dimension: timeliness
  message: Vendor master not updated in 2+ years — review if bank details, payment terms, and addresses are still current
  rule_authority: best_practice

- id: AP034
  field: LFA1.STCEG
  check_class: regex_check
  pattern: "^[A-Z]{2}[0-9A-Z]{5,15}$"
  severity: high
  dimension: accuracy
  message: Vendor VAT/tax registration number format is invalid — must start with 2-letter country code followed by alphanumeric characters
  why_it_matters: Invalid VAT numbers cause tax reporting errors, rejected electronic invoices, and SARS/HMRC compliance failures.
  rule_authority: best_practice
  sap_impact: Tax reporting includes invalid VAT numbers. E-invoicing is rejected by tax authority. VAT reclaim is disallowed.
  fix_map:
    __blank__: "Correct the vendor tax number via XK02 > Tax Information tab. Validate against the VIES or SARS database."
