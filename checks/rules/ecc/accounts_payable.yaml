- id: AP030
  field: LFB1.REPRF
  check_class: domain_value_check
  severity: low
  dimension: validity
  message: Double invoice check flag has an invalid value
  why_it_matters: Double invoice check flag (LFB1.REPRF) must contain a valid value. Invalid values may cause errors in downstream
    SAP processes and integrations.
  rule_authority: best_practice
  sap_impact: Invalid Double invoice check flag may cause transaction errors or incorrect processing.
  allowed_values:
  - ''
  - X
  valid_values_with_labels:
    ? ''
    : Not set
    X: X
  fix_map:
    __blank__: 'In ECC: Set via FK02/XK02. In S/4HANA: Use Fiori app F3893 (Manage Business Partner).'
    __other__: 'Value {invalid_value} is not valid for Double invoice check flag. Allowed values: ['''', ''X''].'
  record_fix_template: 'Record has invalid LFB1.REPRF value ''{actual_value}''. In ECC: Set via FK02/XK02. In S/4HANA: Use
    Fiori app F3893 (Manage Business Partner).'
