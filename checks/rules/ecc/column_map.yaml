# =========================================================
# Meridian Platform — SAP ECC Column Mapping Dictionary
# =========================================================
# Maps common CSV column headers (from SAP extracts, SE16N exports,
# and customer spreadsheets) to canonical TABLE.FIELD format.
#
# Format:  "Column Header Alias": "TABLE.FIELD"
#
# Each module includes:
#   1. SAP technical field names (e.g. MATNR → MARA.MATNR)
#   2. SAP description text (e.g. "Material Number" → MARA.MATNR)
#   3. Common abbreviations and customer variations
#   4. _DESC suffix fields (description lookups from text tables)
#   5. Custom Z-field pattern hints (ZZ*, ZZ_*)
#
# Covers: MARA, MARC, MARD, MAKT, MBEW, MVKE, MARM,
#         BUT000, BUT100, ADR6, ADRC,
#         KNA1, KNB1, KNVV, LFA1, LFB1,
#         SKA1, SKB1, ANLA, ANLB,
#         EKKO, EKPO, VBAK, VBAP,
#         EQUI, IFLOT, CRHD, PLKOD, STKO, STPO
# =========================================================

