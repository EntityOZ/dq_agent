module: material_master
target_state: ECC_AND_S4HANA
rules:
- id: MM001
  field: MARA.MATNR
  check_class: null_check
  severity: critical
  dimension: completeness
  message: Material number is mandatory - primary key for all material transactions
  why_it_matters: MATNR is the unique identifier for every material in SAP. Without it, no procurement, production, sales,
    or inventory transaction can reference the material. In both ECC (MM01/MM02) and S/4HANA (Fiori F1602 Manage Product Master
    Data), the material number is the non-negotiable primary key.
  rule_authority: sap_hard_constraint
  sap_impact: Material cannot exist in SAP. All MM, PP, SD, FI, and WM transactions referencing this record will fail.
  fix_map:
    __blank__: 'In ECC: assign via MM01 using internal or external number range (MMNR). In S/4HANA: use Fiori app F1602 (Manage
      Product Master Data) to create with a valid number range.'
  record_fix_template: 'Material {MARA.MATNR}: material number is {actual_value}. Assign a valid number via MM01 (ECC) or
    Fiori F1602 (S/4HANA).'
- id: MM002
  field: MARA.MATNR
  check_class: regex_check
  pattern: ^[A-Z0-9\-_/\.]{1,40}$
  severity: critical
  dimension: validity
  message: 'Material number must be 1-40 chars: uppercase alphanumeric, hyphens, underscores, slashes, dots'
  why_it_matters: In ECC, MATNR is limited to 18 characters. In S/4HANA, the field was extended to 40 characters to support
    longer material numbering schemes. This rule uses the S/4HANA-compatible length. Only uppercase alphanumeric characters,
    hyphens, underscores, forward slashes, and dots are permitted. Lowercase or special characters are rejected by MM01 (ECC)
    and Fiori F1602 (S/4HANA).
  rule_authority: sap_hard_constraint
  sap_impact: Material cannot be created. All BOMs, purchase orders, production orders, and sales orders referencing an invalid
    number will fail.
  fix_map:
    __other__: 'Material number ''{invalid_value}'' does not conform to the required format. In ECC: convert to uppercase,
      remove special characters, max 18 chars (MM02). In S/4HANA: max 40 chars, same character restrictions (Fiori F1602).
      Use LSMW or migration cockpit for bulk reformatting.'
  record_fix_template: 'Material {MARA.MATNR}: number format is invalid (value: ''{actual_value}''). Reformat to uppercase
    alphanumeric (max 40 chars for S/4HANA) and update references.'
- id: MM003
  field: MARA.MTART
  check_class: null_check
  severity: critical
  dimension: completeness
  message: Material type is mandatory - determines procurement and storage behaviour
  why_it_matters: Material type is the most fundamental classification in the Material Master. It controls which organisational
    levels are maintained, which fields are required, which procurement processes apply, and which valuation class is used
    for accounting. In ECC, set via MM01/MM02. In S/4HANA, set via Fiori F1602. A material without a type cannot be used in
    any SAP process.
  rule_authority: sap_hard_constraint
  sap_impact: Material cannot be created or used in MM, PP, SD, or FI without a valid material type. Affects MRP (MD01), goods
    movements (MIGO), and all purchasing processes (ME21N).
  fix_map:
    __blank__: 'In ECC: determine correct type and set via MM02 > Organisational levels. In S/4HANA: use Fiori F1602 (Manage
      Product Master Data). Common types: FERT (finished), HALB (semi-finished), ROH (raw), HAWA (trading).'
  record_fix_template: 'Material {MARA.MATNR}: MTART is {actual_value}. Set material type via MM02 (ECC) or Fiori F1602 (S/4HANA).'
- id: MM004
  field: MARA.MTART
  check_class: domain_value_check
  allowed_values:
  - FERT
  - HALB
  - ROH
  - HAWA
  - DIEN
  - NLAG
  - ERSA
  - IBAU
  - VERP
  - LEIH
  - UNBW
  - KMAT
  - PIPE
  - WETT
  severity: critical
  dimension: validity
  message: Material type must be a valid SAP material type
  why_it_matters: Only standard SAP material types are supported. Custom or non-standard types must be mapped to valid types
    or configured via OMS2 (ECC) or SPRO (S/4HANA). Invalid types are rejected during material creation and migration.
  rule_authority: sap_hard_constraint
  sap_impact: Material cannot be created. Migration conversion rejects unknown material types.
  valid_values_with_labels:
    FERT: Finished product - manufactured and sold
    HALB: Semi-finished product - used in production
    ROH: Raw material - purchased for production
    HAWA: Trading goods - purchased and sold without processing
    DIEN: Service - non-physical service item
    NLAG: Non-stock material - consumed directly on purchase
    ERSA: Spare part - maintenance and repair
    IBAU: Maintenance assembly - equipment structure
    VERP: Packaging material
    LEIH: Returnable packaging
    UNBW: Non-valuated material
    KMAT: Configurable material
    PIPE: Pipeline material (e.g. electricity, water)
    WETT: Competitive product
  fix_map:
    __other__: 'Material type ''{invalid_value}'' is not in the allowed list. In ECC: map to a valid type or configure custom
      type via OMS2. In S/4HANA: use Fiori F1602 or configure via SPRO > Logistics General > Material Master > Basic Settings.'
  record_fix_template: 'Material {MARA.MATNR}: MTART is ''{actual_value}''. Map to a valid SAP material type via MM02 (ECC)
    or Fiori F1602 (S/4HANA).'
- id: MM005
  field: MARA.MBRSH
  check_class: null_check
  severity: high
  dimension: completeness
  message: Industry sector is required for material classification
  why_it_matters: Industry sector (MBRSH) determines which user department screens and field selection rules apply to the
    material master. It must be set at material creation and cannot be changed afterward in either ECC (MM01) or S/4HANA (Fiori
    F1602). Incorrect assignment requires material recreation.
  rule_authority: sap_hard_constraint
  sap_impact: Material master screen layout is incorrect. Field selections defined per industry sector will not apply, leading
    to missing required fields.
  fix_map:
    __blank__: 'In ECC: set during material creation via MM01; cannot change after creation. In S/4HANA: set via Fiori F1602
      during creation. Common values: M (mechanical), C (chemical), P (pharmaceutical), E (electrical), A (plant engineering).'
  record_fix_template: 'Material {MARA.MATNR}: MBRSH is {actual_value}. Industry sector cannot be changed after creation -
    may require material recreation.'
- id: MM006
  field: MARA.MBRSH
  check_class: domain_value_check
  allowed_values:
  - M
  - C
  - P
  - E
  - A
  severity: high
  dimension: validity
  message: Industry sector must be a valid SAP industry code
  why_it_matters: MBRSH must match a configured industry sector. Invalid values prevent correct field selection and screen
    layout. In both ECC and S/4HANA, the valid values are maintained in table T137.
  rule_authority: sap_hard_constraint
  sap_impact: Material creation fails with invalid industry sector. Screen layout and field selections are undefined.
  valid_values_with_labels:
    M: Mechanical engineering
    C: Chemical industry
    P: Pharmaceutical industry
    E: Electrical engineering
    A: Plant engineering and construction
  fix_map:
    __other__: 'Industry sector ''{invalid_value}'' is not valid. In ECC: check valid values in table T137 via SE16. In S/4HANA:
      check via SPRO or Fiori F1602.'
  record_fix_template: 'Material {MARA.MATNR}: MBRSH is ''{actual_value}''. Correct to a valid industry sector (M, C, P, E,
    A).'
- id: MM007
  field: MARA.MATKL
  check_class: null_check
  severity: high
  dimension: completeness
  message: Material group is required for reporting and procurement
  why_it_matters: Material group (MATKL) is used for spend analysis, procurement reporting, and automatic source determination.
    It is a key classification field for all MM reporting in both ECC and S/4HANA. Required for many purchasing workflows
    and analytics in ME2M, ME80FN, and Fiori Purchasing Analytics.
  rule_authority: sap_hard_constraint
  sap_impact: Spend analysis and procurement reporting are incomplete. Automatic source determination (ME21N) and reporting
    by material group fail.
  fix_map:
    __blank__: 'In ECC: assign via MM02 > Basic Data 1; check existing groups in table T023 or via OMSF. In S/4HANA: use Fiori
      F1602 (Manage Product Master Data).'
  record_fix_template: 'Material {MARA.MATNR}: MATKL is {actual_value}. Assign a material group via MM02 (ECC) or Fiori F1602
    (S/4HANA).'
- id: MM008
  field: MARA.MEINS
  check_class: null_check
  severity: critical
  dimension: completeness
  message: Base unit of measure is mandatory for all materials
  why_it_matters: MEINS is the base unit of measure for all stock quantities, goods movements, and inventory management. Without
    it, no quantity-based transaction can process this material. It is a hard requirement for material creation in both ECC
    (MM01) and S/4HANA (Fiori F1602).
  rule_authority: sap_hard_constraint
  sap_impact: Material cannot be created. All goods movements (MIGO), purchase orders (ME21N), production orders (CO01), and
    inventory counts (MI01) fail.
  fix_map:
    __blank__: 'In ECC: set via MM02 > Basic Data 1. In S/4HANA: use Fiori F1602. Common units: EA (each), KG (kilogram),
      L (litre), M (metre), PC (piece).'
  record_fix_template: 'Material {MARA.MATNR}: MEINS is {actual_value}. Set the base unit of measure via MM02 (ECC) or Fiori
    F1602 (S/4HANA).'
- id: MM009
  field: MARA.BSTME
  check_class: null_check
  severity: medium
  dimension: completeness
  message: Order unit is recommended for purchasing - defaults to base UoM if missing
  why_it_matters: BSTME is the purchase order unit of measure. If not maintained, SAP defaults to the base unit (MEINS), which
    may not match supplier packaging. Incorrect order units cause quantity discrepancies in goods receipt (MIGO) and invoice
    verification (MIRO) in both ECC and S/4HANA.
  rule_authority: best_practice
  sap_impact: Purchase orders (ME21N) default to base UoM. Conversion errors may occur during goods receipt if supplier ships
    in different units.
  fix_map:
    __blank__: 'In ECC: set via MM02 > Purchasing view. In S/4HANA: use Fiori F1602. Ensure UoM conversion is maintained in
      MARM if order unit differs from base.'
  record_fix_template: 'Material {MARA.MATNR}: BSTME is {actual_value}. Set the order unit via MM02 > Purchasing (ECC) or
    Fiori F1602 (S/4HANA).'
- id: MM010
  field: MARA.BISMT
  check_class: null_check
  severity: low
  dimension: completeness
  message: Old material number is recommended for traceability during migration
  why_it_matters: BISMT stores the old material number from the source system. It is essential for post-migration traceability,
    allowing users to look up materials by their legacy number. Searchable via MM03 (ECC) or Fiori F1602 (S/4HANA).
  rule_authority: best_practice
  sap_impact: Users cannot cross-reference materials between old and new systems. Post-migration support and data reconciliation
    are more difficult.
  fix_map:
    __blank__: 'In ECC: populate via MM02 > Basic Data 1. In S/4HANA: use Fiori F1602. Set to the source system material number
      for migration traceability.'
  record_fix_template: 'Material {MARA.MATNR}: BISMT is {actual_value}. Populate with the source system material number via
    MM02 (ECC) or Fiori F1602 (S/4HANA).'
- id: MM011
  field: MARA.ERSDA
  check_class: null_check
  severity: medium
  dimension: completeness
  message: Creation date should be populated for material lifecycle tracking
  why_it_matters: ERSDA records when the material was created. It is auto-populated by SAP during MM01 creation but may be
    missing in migrated data. Used for lifecycle reporting and audit trails in both ECC and S/4HANA.
  rule_authority: best_practice
  sap_impact: Material lifecycle reports and aging analysis are incomplete. Audit trails for material creation cannot be established.
  fix_map:
    __blank__: 'In ECC: typically auto-set by MM01; for migrated records, populate via LSMW or direct table update. In S/4HANA:
      auto-set by Fiori F1602.'
  record_fix_template: 'Material {MARA.MATNR}: ERSDA is {actual_value}. Populate the creation date for lifecycle tracking.'
- id: MM012
  field: MARA.LAEDA
  check_class: freshness_check
  max_age_hours: 17520
  severity: medium
  dimension: timeliness
  message: Material not updated in 2+ years - review if data is still current
  why_it_matters: Materials not updated in over 2 years may contain obsolete pricing, outdated specifications, or discontinued
    procurement sources. Migrating stale data increases post-go-live cleanup. Check via MM03 (ECC) or Fiori F1602 (S/4HANA)
    to verify current status.
  rule_authority: best_practice
  sap_impact: Procurement with outdated info sources (ME21N), MRP with stale lead times (MD01), and valuation with old prices
    (CK11N) produce incorrect results.
  fix_map:
    __other__: 'Material has not been updated in over 2 years. In ECC: review via MM03 and update via MM02. In S/4HANA: use
      Fiori F1602. If discontinued, set status to blocked (MSTAE) before migration to avoid migrating dead data.'
  record_fix_template: 'Material {MARA.MATNR}: last updated {actual_value}. Review if this material is still active. Refresh
    or block as appropriate.'
- id: MM013
  field: MARA.LVORM
  check_class: domain_value_check
  allowed_values:
  - ''
  - X
  severity: medium
  dimension: validity
  message: Deletion flag must be blank or 'X'
  why_it_matters: LVORM is the client-level deletion flag. When set to 'X', the material is flagged for deletion by archiving
    run SARA (ECC) or Fiori F2723 (S/4HANA). Any other value is invalid and causes undefined behaviour in deletion programs.
  rule_authority: sap_hard_constraint
  sap_impact: Archiving programs (SARA) and deletion reports fail on invalid flag values. Materials may be unexpectedly included
    or excluded from deletion runs.
  valid_values_with_labels:
    ? ''
    : Not flagged for deletion
    X: Flagged for deletion
  fix_map:
    __other__: 'Deletion flag ''{invalid_value}'' is not valid. Must be blank or ''X''. In ECC: correct via MM06 (flag for
      deletion) or MM02. In S/4HANA: use Fiori F1602.'
  record_fix_template: 'Material {MARA.MATNR}: LVORM is ''{actual_value}''. Set to blank (active) or ''X'' (flagged for deletion).'
- id: MM014
  field: MARA.NTGEW
  check_class: null_check
  severity: medium
  dimension: completeness
  message: Net weight is recommended for logistics and shipping calculations
  why_it_matters: Net weight is used in shipping calculations, transportation planning, and customs declarations. Missing
    weight data causes inaccurate logistics planning in VL01N (ECC) and Fiori F5765 (S/4HANA) and may block customs.
  rule_authority: best_practice
  sap_impact: Shipping weight calculations in delivery processing (VL01N) are inaccurate. Transportation planning (VT01N)
    and customs declarations may fail.
  fix_map:
    __blank__: 'In ECC: set via MM02 > Basic Data 1. In S/4HANA: use Fiori F1602. Obtain weight from product specifications
      or weighing data.'
  record_fix_template: 'Material {MARA.MATNR}: NTGEW is {actual_value}. Set the net weight via MM02 (ECC) or Fiori F1602 (S/4HANA).'
- id: MM015
  field: MARA.BRGEW
  check_class: null_check
  severity: medium
  dimension: completeness
  message: Gross weight is recommended for shipping and transportation planning
  why_it_matters: Gross weight (BRGEW) includes packaging and is used for transportation planning, load building, and carrier
    cost calculation. Required for accurate shipping in VL01N/VT01N (ECC) and Fiori logistics apps (S/4HANA).
  rule_authority: best_practice
  sap_impact: Transportation planning and load building produce incorrect results. Carrier invoices may not match planned
    shipping costs.
  fix_map:
    __blank__: 'In ECC: set via MM02 > Basic Data 1. In S/4HANA: use Fiori F1602. Gross weight should include packaging weight.'
  record_fix_template: 'Material {MARA.MATNR}: BRGEW is {actual_value}. Set the gross weight via MM02 (ECC) or Fiori F1602
    (S/4HANA).'
- id: MM016
  field: MARA.GEWEI
  check_class: domain_value_check
  allowed_values:
  - KG
  - G
  - LB
  - OZ
  - T
  - TO
  severity: medium
  dimension: validity
  message: Weight unit must be a valid ISO unit (KG, G, LB, OZ, T, TO)
  why_it_matters: Weight unit must be a recognised unit for correct weight conversions across logistics, shipping, and customs.
    Invalid units cause conversion errors in all weight-dependent calculations in both ECC and S/4HANA.
  rule_authority: sap_hard_constraint
  sap_impact: Weight conversions in delivery processing and transportation planning produce incorrect results. Customs declarations
    may be rejected.
  valid_values_with_labels:
    KG: Kilogram
    G: Gram
    LB: Pound
    OZ: Ounce
    T: Metric ton
    TO: Metric ton (alternate)
  fix_map:
    __other__: 'Weight unit ''{invalid_value}'' is not valid. In ECC: correct via MM02 > Basic Data 1. In S/4HANA: use Fiori
      F1602. Valid units: KG, G, LB, OZ, T, TO.'
  record_fix_template: 'Material {MARA.MATNR}: GEWEI is ''{actual_value}''. Set to a valid weight unit via MM02 (ECC) or Fiori
    F1602 (S/4HANA).'
- id: MM017
  field: MARA.VOLEH
  check_class: domain_value_check
  allowed_values:
  - L
  - ML
  - CCM
  - CDM
  - M3
  - FT3
  - GAL
  severity: medium
  dimension: validity
  message: Volume unit must be a valid ISO unit
  why_it_matters: Volume unit controls all volume-based calculations including storage bin capacity, transportation load planning,
    and customs declarations. Invalid units cause conversion errors in WM/EWM and logistics.
  rule_authority: sap_hard_constraint
  sap_impact: Storage bin capacity calculations (LS01N) and transportation load planning produce incorrect results.
  valid_values_with_labels:
    L: Litre
    ML: Millilitre
    CCM: Cubic centimetre
    CDM: Cubic decimetre
    M3: Cubic metre
    FT3: Cubic foot
    GAL: Gallon (US)
  fix_map:
    __other__: 'Volume unit ''{invalid_value}'' is not valid. In ECC: correct via MM02 > Basic Data 1. In S/4HANA: use Fiori
      F1602.'
  record_fix_template: 'Material {MARA.MATNR}: VOLEH is ''{actual_value}''. Set to a valid volume unit via MM02 (ECC) or Fiori
    F1602 (S/4HANA).'
- id: MM018
  field: MARA.EAN11
  check_class: regex_check
  pattern: ^[0-9]{8,14}$
  severity: medium
  dimension: validity
  message: GTIN/EAN must be 8-14 digit numeric barcode
  why_it_matters: EAN/GTIN is the international barcode standard used in warehouse operations, POS systems, and EDI. Invalid
    barcodes cause scanning failures in WM (LT01, LT10 in ECC) and EWM (S/4HANA), and EDI message rejections.
  rule_authority: sap_hard_constraint
  sap_impact: Warehouse goods movements via barcode scanning fail. EDI messages (DESADV, ORDERS) are rejected by trading partners.
  fix_map:
    __other__: 'EAN/GTIN ''{invalid_value}'' is invalid. Must be 8-14 numeric digits (EAN-8, EAN-13, GTIN-14). In ECC: update
      via MM02 > Basic Data 1. In S/4HANA: use Fiori F1602. Verify against GS1 registry.'
  record_fix_template: 'Material {MARA.MATNR}: EAN11 is ''{actual_value}''. Correct the barcode format (8-14 numeric digits)
    via MM02 (ECC) or Fiori F1602 (S/4HANA).'
- id: MM019
  field: MARA.MSTAE
  check_class: domain_value_check
  allowed_values:
  - '10'
  - '20'
  - '30'
  - '40'
  - KK
  - KL
  - KP
  - KW
  - VP
  severity: high
  dimension: validity
  message: Cross-plant material status must be a valid SAP status code
  why_it_matters: Cross-plant material status (MSTAE) controls which business processes are allowed for the material across
    all plants. Invalid status codes cause unpredictable behaviour in procurement, production, and sales in both ECC and S/4HANA.
  rule_authority: sap_hard_constraint
  sap_impact: Material behaviour is undefined. Procurement (ME21N), production (CO01), and sales (VA01) may allow or block
    transactions incorrectly.
  valid_values_with_labels:
    '10': Created - basic data maintained
    '20': In preparation - not yet released
    '30': Released - available for all processes
    '40': Blocked - no new transactions allowed
    KK: Blocked for costing
    KL: Blocked for storage location
    KP: Blocked for procurement
    KW: Blocked for quality management
    VP: Blocked for production
  fix_map:
    __blank__: 'In ECC: assign status via MM02 > Basic Data 1. In S/4HANA: use Fiori F1602. Use 30 for active materials ready
      for all processes.'
    __other__: 'Status ''{invalid_value}'' is not valid. In ECC: correct via MM02 or configure via OMS4. In S/4HANA: use Fiori
      F1602 or SPRO configuration.'
  record_fix_template: 'Material {MARA.MATNR}: MSTAE is ''{actual_value}''. Assign a valid status code via MM02 (ECC) or Fiori
    F1602 (S/4HANA).'
- id: MM020
  field: MARA.SPART
  check_class: null_check
  severity: medium
  dimension: completeness
  message: Division is recommended for sales organisation assignment
  why_it_matters: Division (SPART) is an organisational unit used to group materials for sales reporting and distribution
    channel assignment. Required for SD master data extension. In ECC, maintained via MM02. In S/4HANA, via Fiori F1602.
  rule_authority: best_practice
  sap_impact: Material cannot be extended to sales organisation views without division. Sales reporting by division is incomplete.
  fix_map:
    __blank__: 'In ECC: set via MM02 > Basic Data 1. In S/4HANA: use Fiori F1602. Determine the correct division from the
      sales organisation structure.'
  record_fix_template: 'Material {MARA.MATNR}: SPART is {actual_value}. Assign division via MM02 (ECC) or Fiori F1602 (S/4HANA).'
- id: MM021
  field: MARA.PRDHA
  check_class: null_check
  severity: medium
  dimension: completeness
  message: Product hierarchy is recommended for sales analytics and pricing
  why_it_matters: Product hierarchy (PRDHA) enables hierarchical reporting in sales and is used for condition records in pricing.
    Without it, pricing by product hierarchy (VK11) and sales analytics are limited. Maintained in both ECC (MM02) and S/4HANA
    (Fiori F1602).
  rule_authority: best_practice
  sap_impact: Pricing condition records by product hierarchy cannot be applied. Sales reporting by product hierarchy is unavailable.
  fix_map:
    __blank__: 'In ECC: set via MM02 > Basic Data 1. In S/4HANA: use Fiori F1602. Product hierarchy structure is configured
      in V/76 (ECC) or SPRO.'
  record_fix_template: 'Material {MARA.MATNR}: PRDHA is {actual_value}. Assign product hierarchy via MM02 (ECC) or Fiori F1602
    (S/4HANA).'
- id: MM022
  field: MARA.XCHPF
  check_class: domain_value_check
  allowed_values:
  - ''
  - X
  severity: medium
  dimension: validity
  message: Batch management flag must be blank or 'X'
  why_it_matters: XCHPF controls whether the material is batch-managed. Once activated, all inventory transactions require
    a batch number. Cannot be deactivated if stock exists. In both ECC (MM02) and S/4HANA (Fiori F1602), this is a critical
    logistics control.
  rule_authority: sap_hard_constraint
  sap_impact: Invalid values cause goods movements (MIGO) to fail. Batch determination in SD (VL01N) and QM (QA01) processes
    malfunction.
  valid_values_with_labels:
    ? ''
    : Not batch-managed
    X: Batch-managed
  fix_map:
    __other__: 'Batch flag ''{invalid_value}'' is not valid. Must be blank or ''X''. In ECC: correct via MM02 > Purchasing
      view. In S/4HANA: use Fiori F1602.'
  record_fix_template: 'Material {MARA.MATNR}: XCHPF is ''{actual_value}''. Set to blank or ''X'' via MM02 (ECC) or Fiori
    F1602 (S/4HANA).'
- id: MM023
  field: MARA.DISMM
  check_class: domain_value_check
  allowed_values:
  - PD
  - VB
  - VM
  - VV
  - ND
  - R1
  - M1
  severity: high
  dimension: validity
  message: MRP type at material level must be a valid SAP MRP type code
  why_it_matters: 'MARA.DISMM is the MRP type at the material header level. It determines which MRP procedure is used: PD
    (MRP), VB (manual reorder point), VM (automatic reorder point), VV (forecast-based), ND (no planning). In S/4HANA, MRP
    Live (MD01N / Fiori F2886) requires valid types.'
  rule_authority: sap_hard_constraint
  sap_impact: MRP run (MD01/MD01N) skips materials with invalid types. Procurement proposals are not generated.
  valid_values_with_labels:
    PD: MRP - deterministic planning based on requirements
    VB: Manual reorder point planning
    VM: Automatic reorder point planning
    VV: Forecast-based planning
    ND: No planning - excluded from MRP
    R1: Time-phased planning
    M1: Master production scheduling
  fix_map:
    __other__: 'MRP type ''{invalid_value}'' is not valid. In ECC: correct via MM02 > MRP 1 view or configure via OPPR. In
      S/4HANA: use Fiori F1602 or F2886.'
  record_fix_template: 'Material {MARA.MATNR}: DISMM is ''{actual_value}''. Set a valid MRP type via MM02 > MRP 1 (ECC) or
    Fiori F1602 (S/4HANA).'
- id: MM024
  field: MARA.SERLV
  check_class: domain_value_check
  allowed_values:
  - ''
  - '01'
  - '02'
  - '03'
  severity: medium
  dimension: validity
  message: Serialisation level must be a valid SAP serial number profile code
  why_it_matters: 'SERLV controls serial number assignment: blank (none), 01 (optional), 02 (obligatory), 03 (automatic).
    Invalid values break serialisation in goods movements (MIGO) and service management (IW21) in both ECC and S/4HANA.'
  rule_authority: sap_hard_constraint
  sap_impact: Goods movements fail if serialisation is required but invalid. Serial number tracking for warranty and service
    management breaks.
  valid_values_with_labels:
    ? ''
    : No serialisation
    '01': Optional serial number
    '02': Obligatory serial number
    '03': Automatic serial number
  fix_map:
    __other__: 'Serialisation level ''{invalid_value}'' is not valid. In ECC: set via MM02 > General Plant Data/Storage. In
      S/4HANA: use Fiori F1602.'
  record_fix_template: 'Material {MARA.MATNR}: SERLV is ''{actual_value}''. Set to a valid serialisation level via MM02 (ECC)
    or Fiori F1602 (S/4HANA).'
- id: MM025
  field: MARC.WERKS
  check_class: null_check
  severity: critical
  dimension: completeness
  message: Plant is mandatory for material plant-level data
  why_it_matters: Plant (WERKS) is a mandatory organisational level for procurement, production planning, and inventory management.
    Without a plant assignment, the material cannot be stocked, ordered, or produced. Required in both ECC (MM01/MM02) and
    S/4HANA (Fiori F1602).
  rule_authority: sap_hard_constraint
  sap_impact: 'Material cannot be used in any plant-level transaction: goods receipt (MIGO), purchase orders (ME21N), production
    orders (CO01), MRP (MD01).'
  fix_map:
    __blank__: 'In ECC: extend material to plant via MM01 (extend view) or MM02. In S/4HANA: use Fiori F1602 to extend to
      the correct plant.'
  record_fix_template: 'Material {MARA.MATNR}: WERKS is {actual_value}. Extend the material to the correct plant via MM01
    (ECC) or Fiori F1602 (S/4HANA).'
- id: MM026
  field: MARC.DISPO
  check_class: null_check
  severity: high
  dimension: completeness
  message: MRP controller is required for materials included in MRP planning
  why_it_matters: DISPO identifies the MRP controller responsible for planning the material. Without it, MRP run (MD01 in
    ECC, MD01N in S/4HANA, Fiori F2886) cannot assign planning responsibility and the material may be skipped or incorrectly
    planned.
  rule_authority: sap_hard_constraint
  sap_impact: MRP run skips materials without an MRP controller. No procurement proposals or planned orders are generated.
  fix_map:
    __blank__: 'In ECC: assign via MM02 > MRP 1 view. MRP controllers configured in OMD0. In S/4HANA: use Fiori F1602 or configure
      via SPRO.'
  record_fix_template: 'Material {MARA.MATNR} in plant {MARC.WERKS}: DISPO is {actual_value}. Assign an MRP controller via
    MM02 > MRP 1 (ECC) or Fiori F1602 (S/4HANA).'
- id: MM027
  field: MARC.DISMM
  check_class: domain_value_check
  allowed_values:
  - PD
  - VB
  - VM
  - VV
  - ND
  - R1
  - M1
  severity: high
  dimension: validity
  message: Plant-level MRP type must be a valid SAP MRP type code
  why_it_matters: Plant-level MRP type (MARC.DISMM) controls which MRP procedure runs for this material in the specific plant.
    PD (MRP), VB (manual reorder point), ND (no planning). Must match a valid type for MD01 (ECC) or MD01N / Fiori F2886 (S/4HANA)
    to process correctly.
  rule_authority: sap_hard_constraint
  sap_impact: MRP run (MD01/MD01N) skips or errors on materials with invalid types. Procurement proposals and planned orders
    are not generated.
  valid_values_with_labels:
    PD: MRP - deterministic planning
    VB: Manual reorder point
    VM: Automatic reorder point
    VV: Forecast-based planning
    ND: No planning
    R1: Time-phased planning
    M1: Master production scheduling
  fix_map:
    __other__: 'MRP type ''{invalid_value}'' is not valid at plant level. In ECC: correct via MM02 > MRP 1. In S/4HANA: use
      Fiori F1602.'
  record_fix_template: 'Material {MARA.MATNR} plant {MARC.WERKS}: DISMM is ''{actual_value}''. Set valid MRP type via MM02
    > MRP 1 (ECC) or Fiori F1602 (S/4HANA).'
- id: MM028
  field: MARC.BESKZ
  check_class: domain_value_check
  allowed_values:
  - E
  - F
  - X
  severity: high
  dimension: validity
  message: Procurement type must be E (in-house), F (external), or X (both)
  why_it_matters: Procurement type (BESKZ) determines whether a material is produced in-house (E), externally procured (F),
    or both (X). This controls whether MRP generates planned orders or purchase requisitions. Critical for MRP in both ECC
    (MD01) and S/4HANA (MD01N / Fiori F2886).
  rule_authority: sap_hard_constraint
  sap_impact: MRP generates incorrect proposal types. In-house production materials get purchase requisitions or vice versa.
  valid_values_with_labels:
    E: In-house production
    F: External procurement
    X: Both procurement types
  fix_map:
    __other__: 'Procurement type ''{invalid_value}'' is not valid. Must be E, F, or X. In ECC: correct via MM02 > MRP 2 view.
      In S/4HANA: use Fiori F1602.'
  record_fix_template: 'Material {MARA.MATNR} plant {MARC.WERKS}: BESKZ is ''{actual_value}''. Set to E (in-house), F (external),
    or X (both) via MM02 (ECC) or Fiori F1602 (S/4HANA).'
- id: MM029
  field: MARC.PRCTR
  check_class: null_check
  severity: high
  dimension: completeness
  message: Profit center is required for FI-CO integration
  why_it_matters: Profit center (PRCTR) at the plant level drives CO-PA profitability analysis and balance sheet splitting.
    In S/4HANA, profit center is a mandatory assignment for the Universal Journal (ACDOCA). In ECC, it is required for profit
    center accounting (transaction KE51).
  rule_authority: sap_hard_constraint
  sap_impact: FI postings lack profit center assignment. CO-PA analysis and balance sheet reporting by profit center are incomplete.
  fix_map:
    __blank__: 'In ECC: assign via MM02 > General Plant Data/Storage. In S/4HANA: use Fiori F1602. Profit centers are maintained
      in KE51 (ECC) or Fiori F3708.'
  record_fix_template: 'Material {MARA.MATNR} plant {MARC.WERKS}: PRCTR is {actual_value}. Assign profit center via MM02 (ECC)
    or Fiori F1602 (S/4HANA).'
- id: MM030
  field: MARC.MMSTA
  check_class: null_check
  severity: medium
  dimension: completeness
  message: Plant-specific material status is recommended for lifecycle control
  why_it_matters: Plant-specific status (MMSTA) allows different lifecycle stages per plant, independent of the cross-plant
    status (MSTAE). Useful when a material is active in one plant but phased out in another. Maintained via MM02 (ECC) or
    Fiori F1602 (S/4HANA).
  rule_authority: best_practice
  sap_impact: Without plant-specific status, all plants share the cross-plant status, preventing plant-level lifecycle management.
  fix_map:
    __blank__: 'In ECC: set via MM02 > MRP 1 view. In S/4HANA: use Fiori F1602. Status values are configured in OMS4 (same
      as cross-plant).'
  record_fix_template: 'Material {MARA.MATNR} plant {MARC.WERKS}: MMSTA is {actual_value}. Set plant-specific status via MM02
    (ECC) or Fiori F1602 (S/4HANA).'
- id: MM031
  field: MARC.ABCIN
  check_class: domain_value_check
  allowed_values:
  - A
  - B
  - C
  severity: medium
  dimension: validity
  message: ABC indicator must be A, B, or C
  why_it_matters: ABC indicator classifies materials by value/importance for inventory management. A (high value), B (medium),
    C (low). Used for cycle counting frequency in MI01 (ECC) and inventory analytics in S/4HANA. Invalid values break ABC
    analysis reporting.
  rule_authority: best_practice
  sap_impact: Cycle counting schedules (MI01) and inventory stratification reports are incorrect. ABC analysis in MCBA is
    unreliable.
  valid_values_with_labels:
    A: High value / high importance
    B: Medium value / medium importance
    C: Low value / low importance
  fix_map:
    __other__: 'ABC indicator ''{invalid_value}'' is not valid. Must be A, B, or C. In ECC: set via MM02 > General Plant Data
      or run ABC analysis MCBA. In S/4HANA: use Fiori F1602 or inventory analytics.'
  record_fix_template: 'Material {MARA.MATNR} plant {MARC.WERKS}: ABCIN is ''{actual_value}''. Set to A, B, or C via MM02
    (ECC) or Fiori F1602 (S/4HANA).'
- id: MM032
  field: MARC.FEVOR
  check_class: null_check
  severity: medium
  dimension: completeness
  message: Production supervisor is recommended for production-planned materials
  why_it_matters: Production supervisor (FEVOR) controls the production scheduler assignment for capacity planning and shop
    floor control. Required for production planning in CO01 (ECC) and Fiori F3888 (S/4HANA). Without it, production orders
    lack scheduler assignment.
  rule_authority: best_practice
  sap_impact: Production orders (CO01) lack scheduler assignment. Capacity planning (CM01) cannot filter by supervisor.
  fix_map:
    __blank__: 'In ECC: set via MM02 > MRP 4 / General Plant Data. In S/4HANA: use Fiori F1602. Supervisors are configured
      in OPJ1.'
  record_fix_template: 'Material {MARA.MATNR} plant {MARC.WERKS}: FEVOR is {actual_value}. Assign production supervisor via
    MM02 (ECC) or Fiori F1602 (S/4HANA).'
- id: MM033
  field: MBEW.VPRSV
  check_class: domain_value_check
  allowed_values:
  - S
  - V
  severity: critical
  dimension: validity
  message: Price control indicator must be S (standard) or V (moving average)
  why_it_matters: 'VPRSV determines how the material is valued: S (standard price) uses a fixed price for all movements, V
    (moving average price) recalculates on each goods receipt. This is a fundamental FI-MM integration control in both ECC
    and S/4HANA. In S/4HANA, material ledger (MBEW.MLAST) is always active, making price control even more critical.'
  rule_authority: sap_hard_constraint
  sap_impact: Material valuation is undefined. All goods movements (MIGO), invoice verification (MIRO), and period-end closing
    (CKML) fail or produce incorrect financial postings.
  valid_values_with_labels:
    S: Standard price - fixed price, variances posted separately
    V: Moving average price - recalculated on each goods receipt
  fix_map:
    __blank__: 'In ECC: set via MM02 > Accounting 1 view. S for manufactured (FERT, HALB), V for purchased (ROH, HAWA). In
      S/4HANA: use Fiori F1602. Note: in S/4HANA, material ledger is always active (MLAST), making this choice more impactful.'
    __other__: 'Value ''{invalid_value}'' is not valid. Must be S or V. In ECC: correct via MM02 > Accounting 1. In S/4HANA:
      use Fiori F1602.'
  record_fix_template: 'Material {MARA.MATNR}: VPRSV is ''{actual_value}''. Set to S (standard price) or V (moving average)
    via MM02 (ECC) or Fiori F1602 (S/4HANA).'
- id: MM034
  field: MBEW.STPRS
  check_class: null_check
  severity: critical
  dimension: completeness
  message: Standard price is required when price control is S - missing value blocks valuation
  why_it_matters: When price control is S (standard), the standard price (STPRS) is the basis for all inventory valuation.
    Without it, no goods movement can be posted because SAP cannot calculate the financial posting amount. In S/4HANA with
    mandatory material ledger, this drives actual costing.
  rule_authority: sap_hard_constraint
  sap_impact: All goods movements (MIGO) for this material fail. Invoice verification (MIRO) cannot post price differences.
    Period-end closing (CKML) errors.
  fix_map:
    __blank__: 'In ECC: run cost estimate CK11N/CK40N or set manually via MM02 > Accounting 1. In S/4HANA: use Fiori F1602
      or cost estimate Fiori F4736.'
  record_fix_template: 'Material {MARA.MATNR}: STPRS is {actual_value}. Set the standard price via MM02 > Accounting 1 (ECC)
    or Fiori F1602 (S/4HANA).'
- id: MM035
  field: MBEW.BKLAS
  check_class: null_check
  severity: critical
  dimension: completeness
  message: Valuation class is mandatory for FI account determination
  why_it_matters: Valuation class (BKLAS) determines which G/L accounts are posted to during goods movements. Without it,
    automatic account determination (OBYC in ECC, SPRO in S/4HANA) cannot resolve the correct accounts. This is a hard prerequisite
    for any financial posting involving this material.
  rule_authority: sap_hard_constraint
  sap_impact: All goods movements (MIGO) fail with account determination errors. No financial postings can be made for inventory
    changes.
  fix_map:
    __blank__: 'In ECC: set via MM02 > Accounting 1 view. Valuation classes configured in OMSK. In S/4HANA: use Fiori F1602.
      Check account determination via OBYC (ECC) or SPRO (S/4HANA).'
  record_fix_template: 'Material {MARA.MATNR}: BKLAS is {actual_value}. Set the valuation class via MM02 > Accounting 1 (ECC)
    or Fiori F1602 (S/4HANA).'
- id: MM036
  field: MBEW.PEINH
  check_class: null_check
  severity: high
  dimension: completeness
  message: Price unit is required for correct valuation calculations
  why_it_matters: Price unit (PEINH) specifies the quantity to which the price refers (e.g., price per 1, per 100, per 1000).
    If missing, SAP defaults to 1, which may cause massive valuation errors for low-value bulk materials. Critical for accurate
    inventory valuation in both ECC and S/4HANA.
  rule_authority: sap_hard_constraint
  sap_impact: Inventory valuation is incorrect. Financial postings for goods movements reflect wrong amounts. Cost estimates
    (CK11N) produce wrong results.
  fix_map:
    __blank__: 'In ECC: set via MM02 > Accounting 1 view. Common values: 1, 100, 1000. In S/4HANA: use Fiori F1602. Match
      to the standard pricing practice.'
  record_fix_template: 'Material {MARA.MATNR}: PEINH is {actual_value}. Set the price unit via MM02 > Accounting 1 (ECC) or
    Fiori F1602 (S/4HANA).'
- id: MM037
  field: MVKE.VKORG
  check_class: null_check
  severity: high
  dimension: completeness
  message: Sales organisation is mandatory for materials sold in SD
  why_it_matters: Sales organisation (VKORG) is a mandatory organisational key for the sales view. Without it, the material
    cannot be used in sales orders (VA01 in ECC, Fiori F5669 in S/4HANA), deliveries, or billing.
  rule_authority: sap_hard_constraint
  sap_impact: Material cannot be sold. Sales orders (VA01), deliveries (VL01N), and billing documents (VF01) cannot reference
    this material.
  fix_map:
    __blank__: 'In ECC: extend material to sales org via MM01 (extend view) or MM02 > Sales Org views. In S/4HANA: use Fiori
      F1602.'
  record_fix_template: 'Material {MARA.MATNR}: VKORG is {actual_value}. Extend material to sales organisation via MM01 (ECC)
    or Fiori F1602 (S/4HANA).'
- id: MM038
  field: MVKE.DWERK
  check_class: null_check
  severity: high
  dimension: completeness
  message: Delivering plant is required for materials with sales views
  why_it_matters: Delivering plant (DWERK) determines which plant fulfils sales orders. Without it, delivery creation (VL01N
    in ECC, Fiori F5765 in S/4HANA) fails because SAP cannot determine the source of goods.
  rule_authority: sap_hard_constraint
  sap_impact: Delivery creation fails. Sales orders cannot be fulfilled without a delivering plant assignment.
  fix_map:
    __blank__: 'In ECC: set via MM02 > Sales Org 1 view. In S/4HANA: use Fiori F1602. Assign the plant that will physically
      ship the material.'
  record_fix_template: 'Material {MARA.MATNR}: DWERK is {actual_value}. Assign delivering plant via MM02 > Sales Org 1 (ECC)
    or Fiori F1602 (S/4HANA).'
- id: MM039
  field: MARM.UMREZ
  check_class: null_check
  severity: high
  dimension: completeness
  message: UoM conversion numerator is required for alternative units of measure
  why_it_matters: UMREZ is the numerator in the unit of measure conversion formula. Without it, quantity conversions between
    base UoM and alternative UoMs fail. This affects all purchasing, sales, and warehouse transactions that use alternative
    units. Maintained in MM02 > Additional Data (ECC) or Fiori F1602 (S/4HANA).
  rule_authority: sap_hard_constraint
  sap_impact: UoM conversion fails. Purchase orders, sales orders, and goods movements using alternative units produce incorrect
    quantities.
  fix_map:
    __blank__: 'In ECC: set via MM02 > Additional Data > Units of Measure. In S/4HANA: use Fiori F1602. Example: if 1 box
      = 12 pieces, UMREZ = 12, UMREN = 1.'
  record_fix_template: 'Material {MARA.MATNR}: UMREZ is {actual_value}. Set conversion numerator via MM02 > Additional Data
    (ECC) or Fiori F1602 (S/4HANA).'
- id: MM040
  field: MARM.UMREN
  check_class: null_check
  severity: high
  dimension: completeness
  message: UoM conversion denominator is required for alternative units of measure
  why_it_matters: UMREN is the denominator in the unit of measure conversion formula. Together with UMREZ, it defines the
    conversion ratio. Missing denominator causes division-by-zero errors in quantity conversion across all logistics processes.
  rule_authority: sap_hard_constraint
  sap_impact: UoM conversion fails with arithmetic errors. All transactions using alternative units produce incorrect or zero
    quantities.
  fix_map:
    __blank__: 'In ECC: set via MM02 > Additional Data > Units of Measure. In S/4HANA: use Fiori F1602. Example: if 1 box
      = 12 pieces, UMREZ = 12, UMREN = 1.'
  record_fix_template: 'Material {MARA.MATNR}: UMREN is {actual_value}. Set conversion denominator via MM02 > Additional Data
    (ECC) or Fiori F1602 (S/4HANA).'
- id: MM041
  field: MARA.NTGEW
  check_class: cross_field_check
  fields:
  - MARA.NTGEW
  - MARA.BRGEW
  condition: '`MARA.NTGEW` <= `MARA.BRGEW`'
  severity: high
  dimension: consistency
  message: Net weight must not exceed gross weight
  why_it_matters: Gross weight includes packaging, so net weight should always be less than or equal to gross weight. A net
    weight exceeding gross weight indicates a data entry error that will cause incorrect shipping calculations in VL01N (ECC)
    and Fiori F5765 (S/4HANA), and may trigger customs exceptions.
  rule_authority: sap_hard_constraint
  sap_impact: Shipping weight calculations are incorrect. Customs declarations may be rejected. Transportation cost calculations
    produce wrong results.
  fix_map:
    __other__: 'Net weight exceeds gross weight, which is physically impossible. In ECC: correct via MM02 > Basic Data 1.
      In S/4HANA: use Fiori F1602. Verify both weights against product specifications.'
  record_fix_template: 'Material {MARA.MATNR}: net weight ({MARA.NTGEW}) exceeds gross weight ({MARA.BRGEW}). Correct via
    MM02 (ECC) or Fiori F1602 (S/4HANA).'
- id: MM042
  field: MARA.MHDHB
  check_class: cross_field_check
  fields:
  - MARA.MHDRZ
  - MARA.MHDHB
  condition: '`MARA.MHDRZ` <= `MARA.MHDHB`'
  severity: high
  dimension: consistency
  message: Minimum remaining shelf life must not exceed total shelf life
  why_it_matters: MHDRZ (minimum remaining shelf life) is the minimum days before expiry that goods receipt will accept. MHDHB
    is the total shelf life in days. If MHDRZ exceeds MHDHB, no goods receipt can ever be posted because the material always
    appears expired. Affects MIGO in ECC and S/4HANA.
  rule_authority: sap_hard_constraint
  sap_impact: Goods receipt (MIGO) rejects all incoming stock because minimum remaining shelf life can never be satisfied.
    Material is effectively blocked.
  fix_map:
    __other__: 'Minimum remaining shelf life exceeds total shelf life. In ECC: correct via MM02 > General Plant Data/Storage.
      In S/4HANA: use Fiori F1602.'
  record_fix_template: 'Material {MARA.MATNR}: minimum shelf life ({MARA.MHDRZ} days) exceeds total shelf life ({MARA.MHDHB}
    days). Correct via MM02 (ECC) or Fiori F1602 (S/4HANA).'
- id: MM043
  field: MBEW.STPRS
  check_class: cross_field_check
  fields:
  - MBEW.VPRSV
  - MBEW.STPRS
  condition: ~((`MBEW.VPRSV` == 'S') & (`MBEW.STPRS`.isna() | (`MBEW.STPRS` == 0)))
  severity: critical
  dimension: consistency
  message: Standard price must be populated and non-zero when price control is S
  why_it_matters: When VPRSV is S (standard price), STPRS must contain a valid price. A zero or blank standard price means
    all inventory movements post at zero value, creating massive financial discrepancies. In S/4HANA with mandatory material
    ledger (MLAST always active), this error propagates into actual costing.
  rule_authority: sap_hard_constraint
  sap_impact: All goods movements post at zero value. Financial statements show zero inventory value. Period-end closing (CKML/CKM3N)
    errors.
  fix_map:
    __other__: 'Standard price is zero or missing but price control is S. In ECC: run cost estimate CK11N or set price via
      MM02 > Accounting 1. In S/4HANA: use Fiori F1602 or cost estimate Fiori F4736.'
  record_fix_template: 'Material {MARA.MATNR}: price control is S but STPRS is {actual_value}. Set a valid standard price
    via MM02 (ECC) or Fiori F1602 (S/4HANA).'
- id: MM044
  field: MARC.BSTMI
  check_class: cross_field_check
  fields:
  - MARC.BSTMI
  - MARC.BSTMA
  condition: '`MARC.BSTMI` <= `MARC.BSTMA`'
  severity: high
  dimension: consistency
  message: Minimum lot size must not exceed maximum lot size
  why_it_matters: BSTMI (minimum lot size) and BSTMA (maximum lot size) define the quantity range for MRP procurement proposals.
    If minimum exceeds maximum, MRP (MD01 in ECC, MD01N / Fiori F2886 in S/4HANA) cannot determine a valid order quantity,
    leading to planning errors or infinite loops.
  rule_authority: sap_hard_constraint
  sap_impact: MRP generates invalid procurement quantities. Planned orders and purchase requisitions have incorrect quantities.
  fix_map:
    __other__: 'Minimum lot size exceeds maximum lot size. In ECC: correct via MM02 > MRP 1 view. In S/4HANA: use Fiori F1602.'
  record_fix_template: 'Material {MARA.MATNR} plant {MARC.WERKS}: min lot ({MARC.BSTMI}) exceeds max lot ({MARC.BSTMA}). Correct
    via MM02 (ECC) or Fiori F1602 (S/4HANA).'
- id: MM045
  field: MAKT.MAKTX
  check_class: null_check
  severity: critical
  dimension: completeness
  message: Material description is missing
  why_it_matters: Material description (MAKT.MAKTX) is not maintained. This field supports downstream processes and reporting
    accuracy. Missing data may result in incomplete records or processing gaps.
  rule_authority: best_practice
  sap_impact: Missing Material description may cause incomplete data in related transactions and reports.
  fix_map:
    __blank__: 'In ECC: Set via MM02. In S/4HANA: Use MM02 or Fiori app F1602 (Manage Product Master Data).'
  record_fix_template: 'Record is missing MAKT.MAKTX. In ECC: Set via MM02. In S/4HANA: Use MM02 or Fiori app F1602 (Manage
    Product Master Data).'
- id: MM046
  field: MARA.AENAM
  check_class: null_check
  severity: low
  dimension: completeness
  message: Changed By user is missing
  why_it_matters: Changed By user (MARA.AENAM) is not maintained. This field supports downstream processes and reporting accuracy.
    Missing data may result in incomplete records or processing gaps.
  rule_authority: best_practice
  sap_impact: Missing Changed By user may cause incomplete data in related transactions and reports.
  fix_map:
    __blank__: 'In ECC: Set via MM02. In S/4HANA: Use MM02 or Fiori app F1602 (Manage Product Master Data).'
  record_fix_template: 'Record is missing MARA.AENAM. In ECC: Set via MM02. In S/4HANA: Use MM02 or Fiori app F1602 (Manage
    Product Master Data).'
- id: MM047
  field: MARA.BEGRU
  check_class: null_check
  severity: low
  dimension: completeness
  message: Authorization group is missing
  why_it_matters: Authorization group (MARA.BEGRU) is not maintained. This field supports downstream processes and reporting
    accuracy. Missing data may result in incomplete records or processing gaps.
  rule_authority: best_practice
  sap_impact: Missing Authorization group may cause incomplete data in related transactions and reports.
  fix_map:
    __blank__: 'In ECC: Set via MM02. In S/4HANA: Use MM02 or Fiori app F1602 (Manage Product Master Data).'
  record_fix_template: 'Record is missing MARA.BEGRU. In ECC: Set via MM02. In S/4HANA: Use MM02 or Fiori app F1602 (Manage
    Product Master Data).'
- id: MM048
  field: MARA.BEHVO
  check_class: null_check
  severity: low
  dimension: completeness
  message: Container requirements is missing
  why_it_matters: Container requirements (MARA.BEHVO) is not maintained. This field supports downstream processes and reporting
    accuracy. Missing data may result in incomplete records or processing gaps.
  rule_authority: best_practice
  sap_impact: Missing Container requirements may cause incomplete data in related transactions and reports.
