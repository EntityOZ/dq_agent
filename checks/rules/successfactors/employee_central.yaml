module: employee_central
target_state: SUCCESSFACTORS_2024
rules:

  - id: EC001
    field: EMPEMPLOYMENT.USERID
    check_class: null_check
    severity: critical
    dimension: completeness
    message: "User ID is mandatory — all EC records must have a unique user identifier"
    why_it_matters: "USERID is the primary key linking an employee across all
      SuccessFactors modules. Without it, compensation, time, and payroll records
      cannot be associated with the correct person. Blank USERID causes complete
      data loss for that employee across the platform."
    rule_authority: sap_hard_constraint
    sap_impact: "Employee invisible to all SF modules. Payroll, Time, and Learning
      records have no anchor record to attach to."
    fix_map:
      "__blank__": "Assign a unique user identifier following your naming convention
        (firstname.lastname or employee number). Bulk-assign via Admin Center >
        Import/Export Data > Employee Import."
      "__null__": "USERID was never set. Assign via Admin Center > Import/Export Data
        > Employee Import."
    record_fix_template: "Employee {EMPEMPLOYMENT.USERID}: USERID is missing.
      Assign via Admin Center > Employee Data Import."

  - id: EC002
    field: EMPEMPLOYMENT.USERID
    check_class: regex_check
    pattern: "^[a-zA-Z0-9._@-]{1,100}$"
    severity: critical
    dimension: validity
    message: "User ID must contain only valid characters (alphanumeric, ., _, @, -)"
    why_it_matters: "SF USERID is used as a key in URLs, API calls, and SSO assertions.
      Special characters outside the allowed set cause authentication failures and
      break all API integrations downstream."
    rule_authority: sap_hard_constraint
    sap_impact: "SSO login fails for this user. All API calls referencing this USERID
      error. Payroll and time integrations break."
    fix_map:
      "__other__": "User ID '{actual_value}' contains invalid characters. Replace
        spaces, slashes, or special symbols with dots or underscores. Update via
        Admin Center > Employee Data Import."
    record_fix_template: "Employee {EMPEMPLOYMENT.USERID}: USERID format invalid
      (value: {actual_value}). Remove special characters via Admin Center import."

  - id: EC003
    field: PERINFO.FIRSTNAME
    check_class: null_check
    severity: high
    dimension: completeness
    message: "First name is required for all employee records"
    why_it_matters: "FIRSTNAME is displayed on pay slips, org charts, and all
      correspondence generated by SuccessFactors. Blank first names produce
      incomplete pay slips and break name-based search across the platform."
    rule_authority: best_practice
    sap_impact: "Pay slips show blank employee name. Org chart displays incomplete.
      Name-based lookups in Manager Self-Service fail."
    fix_map:
      "__blank__": "Add via Admin Center > Employee Data Import > Personal Information template."
      "__null__": "Add via Admin Center import."
    record_fix_template: "Employee {EMPEMPLOYMENT.USERID}: FIRSTNAME is blank.
      Add via Admin Center > Personal Information."

  - id: EC004
    field: PERINFO.LASTNAME
    check_class: null_check
    severity: high
    dimension: completeness
    message: "Last name is required for all employee records"
    why_it_matters: "LASTNAME is the primary sort key for employee lists and appears
      on all official documents. Missing last names cause incorrect alphabetical
      ordering and incomplete document generation."
    rule_authority: best_practice
    sap_impact: "Employee lists sort incorrectly. Pay slips and letters missing surname."
    fix_map:
      "__blank__": "Add via Admin Center > Employee Data Import > Personal Information."
      "__null__": "Add via Admin Center import."
    record_fix_template: "Employee {EMPEMPLOYMENT.USERID}: LASTNAME is blank.
      Add via Admin Center > Personal Information."

  - id: EC005
    field: EMPEMPLOYMENT.START_DATE
    check_class: null_check
    severity: critical
    dimension: completeness
    message: "Employment start date is mandatory for all active employees"
    why_it_matters: "START_DATE drives leave accruals, service length calculations,
      benefit eligibility, and probation period management. Without it, payroll
      cannot calculate tenure-based entitlements and leave balances will be
      incorrect from day one."
    rule_authority: sap_hard_constraint
    sap_impact: "Leave accruals miscalculate. Benefit eligibility rules fail.
      Payroll tenure calculations produce errors. Probation tracking unavailable."
    fix_map:
      "__blank__": "Add the correct commencement date via Admin Center > Employment
        Information. Use ISO format YYYY-MM-DD. Critical before next payroll run."
      "__null__": "Start date was never set. Add immediately via Admin Center >
        Employment Information."
    record_fix_template: "Employee {EMPEMPLOYMENT.USERID}: START_DATE is missing.
      Add employment commencement date via Admin Center > Employment Information.
      Format: YYYY-MM-DD."

  - id: EC006
    field: EMPEMPLOYMENT.START_DATE
    check_class: regex_check
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    severity: high
    dimension: validity
    message: "Employment start date must be in YYYY-MM-DD format"
    why_it_matters: "SuccessFactors requires ISO 8601 date format for all employment
      dates. Non-standard formats are rejected by the SF API and cause import failures."
    rule_authority: sap_hard_constraint
    sap_impact: "Employee record fails SF API validation. Cannot be imported or
      updated until date is reformatted."
    fix_map:
      "__other__": "Date format '{actual_value}' is not ISO 8601. Convert to
        YYYY-MM-DD. If source uses DD/MM/YYYY, transform during extraction."
    record_fix_template: "Employee {EMPEMPLOYMENT.USERID}: START_DATE format invalid
      (value: {actual_value}). Convert to YYYY-MM-DD."

  - id: EC007
    field: EMPEMPLOYMENT.COMPANY
    check_class: null_check
    severity: critical
    dimension: completeness
    message: "Company code is mandatory — links employee to legal entity"
    why_it_matters: "COMPANY links the employee to a specific legal entity in SF.
      Without it, payroll cannot route the employee to the correct entity for tax
      and social contribution calculations."
    rule_authority: sap_hard_constraint
    sap_impact: "Payroll integration fails. Tax and social contributions cannot
      be calculated for this employee."
    fix_map:
      "__blank__": "Assign the correct legal entity code via Admin Center >
        Employment Information. Must match a valid company in SF company list."
      "__null__": "Critical for payroll. Assign immediately via Admin Center."
    record_fix_template: "Employee {EMPEMPLOYMENT.USERID}: COMPANY is missing.
      Assign company code via Admin Center > Employment Information."

  - id: EC008
    field: EMPEMPLOYMENT.DEPARTMENT
    check_class: null_check
    severity: high
    dimension: completeness
    message: "Department is required for organisational structure integrity"
    why_it_matters: "DEPARTMENT determines an employee's position in the organisational
      hierarchy. Missing department breaks org chart rendering, approval workflows
      routed by department, and headcount reporting by cost centre."
    rule_authority: best_practice
    sap_impact: "Org chart shows employee as orphaned. Cost centre reporting incomplete.
      Department-based approval workflows skip this employee."
    fix_map:
      "__blank__": "Assign the correct department code via Admin Center >
        Employment Information. Must match a valid department in your SF org structure."
      "__null__": "Assign via Admin Center import."
    record_fix_template: "Employee {EMPEMPLOYMENT.USERID}: DEPARTMENT is missing.
      Assign via Admin Center > Employment Information."

  - id: EC009
    field: EMPEMPLOYMENT.JOB_CODE
    check_class: null_check
    severity: high
    dimension: completeness
    message: "Job code is required for compensation and grading"
    why_it_matters: "JOB_CODE links the employee to a position in the job catalogue,
      which drives compensation grade eligibility, pay scale assignment, and skills
      requirements."
    rule_authority: best_practice
    sap_impact: "Compensation module cannot apply pay grade rules. Succession planning
      nomination blocked."
    fix_map:
      "__blank__": "Assign from job catalogue via Admin Center > Employment Information."
      "__null__": "Assign via Admin Center import."
    record_fix_template: "Employee {EMPEMPLOYMENT.USERID}: JOB_CODE is missing.
      Assign from job catalogue via Admin Center > Employment Information."

  - id: EC010
    field: EMPEMPLOYMENT.EMPLOYMENT_TYPE
    check_class: domain_value_check
    allowed_values: ["P", "T", "C", "S", "F"]
    severity: high
    dimension: accuracy
    message: "Employment type must be a valid code (P=Permanent, T=Temporary, C=Contract, S=Seasonal, F=Fixed-term)"
    why_it_matters: "EMPLOYMENT_TYPE drives leave entitlement rules, benefit
      eligibility, and payroll calculation method. An invalid code causes the
      wrong entitlements to be applied."
    rule_authority: customer_configured
    sap_impact: "Incorrect leave accruals applied. Wrong benefit plan enrolled.
      Payroll may apply incorrect calculation method."
    valid_values_with_labels:
      "P": "Permanent — indefinite employment"
      "T": "Temporary — fixed period, typically under 3 months"
      "C": "Contract — independent contractor arrangement"
      "S": "Seasonal — recurring seasonal work"
      "F": "Fixed-term — defined end date"
    fix_map:
      "__blank__": "Assign correct code P/T/C/S/F based on contract type via
        Admin Center > Employment Information."
      "__other__": "Employment type '{actual_value}' is not valid. Use P, T, C, S,
        or F. Update via Admin Center > Employment Information."
    record_fix_template: "Employee {EMPEMPLOYMENT.USERID}: EMPLOYMENT_TYPE
      '{actual_value}' is invalid. Set to P/T/C/S/F via Admin Center."

  - id: EC011
    field: EMPEMPLOYMENT.MANAGER_ID
    check_class: null_check
    severity: medium
    dimension: completeness
    message: "Manager assignment is missing — employee has no reporting line"
    why_it_matters: "MANAGER_ID establishes the reporting line used by approval
      workflows, performance reviews, and org chart rendering."
    rule_authority: best_practice
    sap_impact: "Performance review workflow cannot start. Leave approval escalates
      to admin. Employee appears as org chart orphan."
    fix_map:
      "__blank__": "Assign the correct manager USERID via Admin Center >
        Employment Information > Job Information tab."
      "__null__": "Assign via Admin Center import."
    record_fix_template: "Employee {EMPEMPLOYMENT.USERID}: MANAGER_ID is blank.
      Assign reporting manager via Admin Center > Job Information."

  - id: EC012
    field: EMPEMPLOYMENT.POSITION
    check_class: null_check
    severity: medium
    dimension: completeness
    message: "Position assignment required for headcount and succession planning"
    why_it_matters: "POSITION links an employee to a defined headcount slot. Without
      it, headcount reports are inaccurate and succession planning nominees cannot
      be linked to vacancies."
    rule_authority: best_practice
    sap_impact: "Headcount reporting inaccurate. Succession planning cannot nominate
      replacement. Position shown as vacant despite being filled."
    fix_map:
      "__blank__": "Link to the correct position via Admin Center > Position Management.
        Create position first if it doesn't exist."
      "__null__": "Link via Admin Center > Position Management."
    record_fix_template: "Employee {EMPEMPLOYMENT.USERID}: POSITION is missing.
      Assign position via Admin Center > Position Management."

  - id: EC013
    field: EMPEMPLOYMENT.LOCATION
    check_class: null_check
    severity: medium
    dimension: completeness
    message: "Work location is required for tax jurisdiction and compliance"
    why_it_matters: "LOCATION determines the tax jurisdiction, working time regulation,
      and country-specific compliance rules that apply to this employee."
    rule_authority: best_practice
    sap_impact: "Tax jurisdiction defaults to company country — may be wrong.
      Country-specific working time rules not applied."
    fix_map:
      "__blank__": "Assign the correct location code via Admin Center > Employment
        Information. Codes must be pre-configured in Location setup."
      "__null__": "Assign via Admin Center import."
    record_fix_template: "Employee {EMPEMPLOYMENT.USERID}: LOCATION is missing.
      Assign work location via Admin Center > Employment Information."

  - id: EC014
    field: EMPEMPLOYMENT.CREATED_DATE
    check_class: freshness_check
    max_age_hours: 87600
    severity: low
    dimension: timeliness
    message: "Employee record older than 10 years — may contain stale master data"
    why_it_matters: "Employee records older than 10 years likely contain outdated
      contact details, obsolete job codes, and incorrect organisational assignments."
    rule_authority: best_practice
    sap_impact: "Stale data may cause incorrect reporting. Integration systems receive
      outdated employee master data."
    fix_map:
      "__other__": "Record is older than 10 years (created: {actual_value}). Review
        all fields — particularly job code, department, manager, and contact details.
        Update any stale values via Admin Center."
    record_fix_template: "Employee {EMPEMPLOYMENT.USERID}: record created {actual_value},
      over 10 years old. Review and update stale fields via Admin Center."
