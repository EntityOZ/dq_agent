module: performance_goals
target_state: SUCCESSFACTORS
rules:
- id: PERF001
  field: PMREVIEWRESULT.USERID
  check_class: null_check
  severity: critical
  dimension: completeness
  message: "User ID is mandatory \u2014 links performance review to employee record"
  why_it_matters: USERID is the primary key linking a performance review result to its employee. Without it, the review cannot
    be associated with any employee, meaning compensation decisions that depend on performance ratings have no input data.
  rule_authority: best_practice
  sap_impact: Performance-compensation integration fails. Calibration sessions cannot include this review, and merit cycle
    calculations skip the employee.
  fix_map:
    __blank__: Look up the correct employee User ID from Employee Central and populate PMREVIEWRESULT.USERID. Cross-reference
      the review form assignment history to identify the intended employee.
  record_fix_template: 'Review for {PMREVIEWRESULT.USERID}: USERID is missing. Look up the employee from the review form assignment
    and populate PMREVIEWRESULT.USERID.'
- id: PERF002
  field: PMREVIEWRESULT.OVERALL_RATING
  check_class: null_check
  severity: high
  dimension: completeness
  message: Overall rating is required for calibration and compensation planning
  why_it_matters: OVERALL_RATING is the final performance score used in calibration sessions and as input to the compensation
    merit cycle. Without it, the employee is excluded from calibration grids and compensation planning worksheets cannot calculate
    merit increases.
  rule_authority: best_practice
  sap_impact: Employee excluded from calibration session. Compensation planning worksheet shows no performance rating, blocking
    merit increase calculation.
  fix_map:
    __blank__: Ensure the review form is completed and the overall rating is calculated or manually entered by the manager.
      Check if the rating scale is configured correctly on the review template.
  record_fix_template: 'Review for employee {PMREVIEWRESULT.USERID}: OVERALL_RATING is missing. Complete the review form and
    ensure the final rating is submitted.'
- id: PERF003
  field: PMREVIEWRESULT.REVIEW_PERIOD
  check_class: null_check
  severity: high
  dimension: completeness
  message: Review period is required to assign review to the correct performance cycle
  why_it_matters: REVIEW_PERIOD determines which annual or mid-year cycle the review belongs to. Without it, the review cannot
    be placed in the correct performance cycle, causing it to be excluded from period-specific reporting and calibration sessions.
  rule_authority: best_practice
  sap_impact: Review not assigned to any performance cycle. Period-based analytics and calibration sessions exclude this review
    entirely.
  fix_map:
    __blank__: Determine the correct review period from the review form template configuration and populate REVIEW_PERIOD.
      Cross-reference the review creation date with active performance cycles.
  record_fix_template: 'Review for employee {PMREVIEWRESULT.USERID}: REVIEW_PERIOD is missing. Assign the correct performance
    cycle period.'
- id: PERF004
  field: PMREVIEWRESULT.FORM_STATUS
  check_class: domain_value_check
  allowed_values:
  - draft
  - in_review
  - completed
  - cancelled
  severity: high
  dimension: accuracy
  message: Form status must be a valid review workflow state
  why_it_matters: FORM_STATUS controls the review workflow progression. Only completed forms feed into calibration and compensation
    planning. An invalid status causes the form to be excluded from all downstream processes and the review workflow engine
    cannot determine the next step.
  rule_authority: best_practice
  sap_impact: Review form stuck in workflow. Calibration and compensation planning exclude this review. Manager and employee
    cannot progress through the review process.
  valid_values_with_labels:
    draft: "Draft \u2014 form created but not yet started by employee or manager"
    in_review: "In Review \u2014 form is being completed, awaiting final rating"
    completed: "Completed \u2014 review finalised and rating locked"
    cancelled: "Cancelled \u2014 review withdrawn, not applicable for this cycle"
  fix_map:
    __blank__: Assign the correct form status based on the review's current state. Set to draft if not started, in_review
      if in progress, completed if finalised, or cancelled if withdrawn. Update via Performance > Admin > Form Management.
    __other__: Form status '{invalid_value}' is not a valid state. Use draft, in_review, completed, or cancelled. Update via
      Performance > Admin > Form Management.
  record_fix_template: 'Review for employee {PMREVIEWRESULT.USERID}: FORM_STATUS ''{actual_value}'' is invalid. Set to draft/in_review/completed/cancelled
    via Performance > Form Management.'
- id: PERF005
  field: PMREVIEWRESULT.REVIEW_DATE
  check_class: null_check
  severity: medium
  dimension: completeness
  message: Review date is required for audit trail and timeline reporting
  why_it_matters: REVIEW_DATE records when the performance review was completed and is essential for the audit trail. Without
    it, the review cannot be placed on the performance history timeline and audit reports show gaps.
  rule_authority: best_practice
  sap_impact: Performance history timeline has gaps. Audit trail for the review is incomplete. Time-based analytics cannot
    include this review.
  fix_map:
    __blank__: 'Set the review date to the date the form was finalised. Update via Performance > Admin > Form Management.
      Format: YYYY-MM-DD.'
  record_fix_template: 'Review for employee {PMREVIEWRESULT.USERID}: REVIEW_DATE is missing. Set via Performance > Admin >
    Form Management. Format: YYYY-MM-DD.'
- id: PERF006
  field: PMREVIEWRESULT.MANAGER_RATING
  check_class: null_check
  severity: medium
  dimension: completeness
  message: "Manager rating is missing \u2014 required for calibration and final rating derivation"
  why_it_matters: MANAGER_RATING is typically the primary input to the overall rating calculation and is used in calibration
    sessions to compare manager assessment patterns across the organisation. Missing manager ratings create gaps in calibration
    grids.
  rule_authority: best_practice
  sap_impact: Calibration grid shows blank for this employee. Overall rating derivation may fail if configured to require
    manager input.
  fix_map:
    __blank__: Ensure the manager has completed their assessment section of the review form. If the form workflow is stuck,
      check routing rules in Performance > Admin > Form Template Configuration.
  record_fix_template: 'Review for employee {PMREVIEWRESULT.USERID}: MANAGER_RATING is missing. Ensure the manager completes
    their assessment.'
- id: PERF007
  field: GOALPLAN.USERID
  check_class: null_check
  severity: high
  dimension: completeness
  message: User ID is required to link goal plan to employee
  why_it_matters: USERID on the goal plan links the goals to the employee record. Without it, the goal plan is orphaned and
    goals are not visible in the employee's performance review form, breaking the goal-performance alignment.
  rule_authority: best_practice
  sap_impact: Goal plan not visible in performance review form. Manager cannot assess goal achievement during the review.
    Goal completion metrics excluded from dashboards.
  fix_map:
    __blank__: Identify the employee who owns this goal plan from the goal plan assignment history or manager records. Populate
      GOALPLAN.USERID with the correct employee User ID from Employee Central.
  record_fix_template: 'Goal {GOALPLAN.GOAL_ID}: USERID is missing. Identify the goal plan owner and populate GOALPLAN.USERID.'
- id: PERF008
  field: GOALPLAN.GOAL_NAME
  check_class: null_check
  severity: medium
  dimension: completeness
  message: "Goal name is required \u2014 goals without names cannot be reviewed or tracked"
  why_it_matters: GOAL_NAME is the human-readable description that appears in the employee's goal plan and performance review
    form. A blank goal name makes it impossible for the manager to assess achievement and renders the goal invisible in dashboards.
  rule_authority: best_practice
  sap_impact: Goal appears as blank entry in review form. Manager cannot assess achievement. Goal tracking dashboards show
    unnamed entries.
  fix_map:
    __blank__: Add a descriptive goal name via the Goal Plan editor. Goals should follow the SMART framework (Specific, Measurable,
      Achievable, Relevant, Time-bound).
  record_fix_template: 'Goal {GOALPLAN.GOAL_ID} for employee {GOALPLAN.USERID}: GOAL_NAME is blank. Add a descriptive name
    via the Goal Plan editor.'
- id: PERF009
  field: GOALPLAN.GOAL_STATUS
  check_class: domain_value_check
  allowed_values:
  - on_track
  - behind
  - at_risk
  - completed
  - not_started
  severity: medium
  dimension: accuracy
  message: Goal status must be a valid tracking state
  why_it_matters: GOAL_STATUS tracks where the goal is in its lifecycle and feeds into progress dashboards used by managers
    and HR. Invalid values corrupt goal completion rates and make it impossible to identify goals at risk of missing their
    targets.
  rule_authority: customer_configured
  sap_impact: Goal progress dashboards show incorrect completion rates. Manager and HR reports on goal achievement are unreliable.
  valid_values_with_labels:
    on_track: "On Track \u2014 goal progressing as planned"
    behind: "Behind \u2014 goal is behind schedule"
    at_risk: "At Risk \u2014 goal may not be achieved by target date"
    completed: "Completed \u2014 goal has been achieved"
    not_started: "Not Started \u2014 goal has not been initiated"
  fix_map:
    __blank__: Set GOAL_STATUS based on current progress. Use not_started if the goal has not been initiated, on_track if
      progressing normally, behind or at_risk if delayed, or completed if achieved.
    __other__: Goal status '{invalid_value}' is not valid. Use on_track, behind, at_risk, completed, or not_started. Update
      via the Goal Plan editor.
  record_fix_template: 'Goal {GOALPLAN.GOAL_ID} for employee {GOALPLAN.USERID}: GOAL_STATUS ''{actual_value}'' is invalid.
    Update to a valid status via the Goal Plan editor.'
- id: PERF010
  field: GOALPLAN.TARGET_DATE
  check_class: null_check
  severity: medium
  dimension: completeness
  message: Target date is required for goal deadline tracking and overdue alerts
  why_it_matters: TARGET_DATE is the deadline by which the goal should be achieved. Without it, the system cannot generate
    overdue alerts or calculate goal completion timeliness metrics. Goals without deadlines are effectively untracked.
  rule_authority: best_practice
  sap_impact: No overdue alerts for this goal. Goal timeline dashboards show no deadline. Performance review cannot assess
    timeliness of goal completion.
  fix_map:
    __blank__: 'Set the target date via the Goal Plan editor. Align with the performance cycle end date or the specific project
      milestone. Format: YYYY-MM-DD.'
  record_fix_template: 'Goal {GOALPLAN.GOAL_ID} for employee {GOALPLAN.USERID}: TARGET_DATE is missing. Set via the Goal Plan
    editor. Format: YYYY-MM-DD.'
- id: PERF011
  field: GOALPLAN.GOAL_WEIGHT
  check_class: null_check
  severity: medium
  dimension: completeness
  message: Goal weight is required for weighted score calculation in performance reviews
  why_it_matters: GOAL_WEIGHT determines how much each goal contributes to the overall goal achievement score. Without weights,
    the system cannot calculate a weighted performance score, and all goals are treated equally regardless of strategic importance.
  rule_authority: best_practice
  sap_impact: Weighted goal score cannot be calculated. Performance review overall score may be incorrect. Goals of different
    strategic importance treated equally.
  fix_map:
    __blank__: Assign a weight (0-100) to each goal based on its strategic importance. Weights across all goals for an employee
      should sum to 100. Update via the Goal Plan editor.
  record_fix_template: 'Goal {GOALPLAN.GOAL_ID} for employee {GOALPLAN.USERID}: GOAL_WEIGHT is missing. Assign a weight (0-100)
    via the Goal Plan editor.'
- id: PERF012
  field: GOALPLAN.GOAL_METRIC
  check_class: null_check
  severity: low
  dimension: completeness
  message: Goal metric is recommended for objective measurement of achievement
  why_it_matters: GOAL_METRIC defines the measurable indicator used to assess whether the goal was achieved. Without it, goal
    achievement assessment becomes purely subjective, which reduces the objectivity of performance reviews and increases calibration
    disagreements.
  rule_authority: best_practice
  sap_impact: Goal achievement assessment is subjective only. Calibration sessions lack objective data points. Goal tracking
    dashboards show no measurable progress.
  fix_map:
    __blank__: Define a specific, measurable metric for this goal (e.g., revenue target, completion percentage, customer satisfaction
      score). Update via the Goal Plan editor.
  record_fix_template: 'Goal {GOALPLAN.GOAL_ID} for employee {GOALPLAN.USERID}: GOAL_METRIC is missing. Define a measurable
    indicator via the Goal Plan editor.'
- id: PERF013
  field: GOALPLAN.GOAL_ID
  check_class: null_check
  severity: critical
  dimension: completeness
  message: Goal ID is missing
  why_it_matters: Goal ID (GOALPLAN.GOAL_ID) is not maintained. This field supports downstream processes and reporting accuracy.
    Missing data may result in incomplete records or processing gaps.
  rule_authority: best_practice
  sap_impact: Missing Goal ID may cause incomplete data in related transactions and reports.
  fix_map:
    __blank__: Maintain via SuccessFactors Admin Center > Performance & Goals module.
  record_fix_template: Record is missing GOALPLAN.GOAL_ID. Maintain via SuccessFactors Admin Center > Performance & Goals
    module.
- id: PERF014
  field: PMREVIEWRESULT.SELF_RATING
  check_class: null_check
  severity: low
  dimension: completeness
  message: Self rating is missing
  why_it_matters: Self rating (PMREVIEWRESULT.SELF_RATING) is not maintained. This field supports downstream processes and
    reporting accuracy. Missing data may result in incomplete records or processing gaps.
  rule_authority: best_practice
  sap_impact: Missing Self rating may cause incomplete data in related transactions and reports.
  fix_map:
    __blank__: Maintain via SuccessFactors Admin Center > Performance & Goals module.
  record_fix_template: Record is missing PMREVIEWRESULT.SELF_RATING. Maintain via SuccessFactors Admin Center > Performance
    & Goals module.
- id: PERF015
  field: USERID_PERF
  check_class: cross_field_check
  fields: ['USERID_PERF']
  condition: "~`USERID_PERF`.duplicated(keep=False)"
  severity: high
  dimension: uniqueness
  message: Duplicate performance review records per employee per cycle — only one review should exist
  why_it_matters: Duplicate reviews cause conflicting ratings, incorrect calibration results, and compensation decision errors.
  rule_authority: best_practice
  sap_impact: Calibration sessions show conflicting ratings. Compensation decisions reference the wrong review. Overall rating is ambiguous.
  fix_map:
    __blank__: "Identify duplicate review forms in Admin Center > Performance. Delete the incorrect form. Verify the correct form is routed in the current cycle."
