# Development overrides — builds from source, uses Ollama Cloud, hot reload
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment: &dev-env
      - LLM_PROVIDER=ollama_cloud
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5:397b-cloud}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-https://api.ollama.com/v1}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=postgresql+asyncpg://meridian:${DB_PASSWORD}@db:5432/meridian
      - DATABASE_URL_SYNC=postgresql://meridian:${DB_PASSWORD}@db:5432/meridian
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-meridian}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD}
      - MINIO_BUCKET_UPLOADS=${MINIO_BUCKET_UPLOADS:-meridian-uploads}
      - MINIO_BUCKET_REPORTS=${MINIO_BUCKET_REPORTS:-meridian-reports}
      - MERIDIAN_CORS_ORIGINS=${MERIDIAN_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - LICENCE_KEY=${LICENCE_KEY:-}
      - LICENCE_SERVER_URL=${LICENCE_SERVER_URL:-https://licence.meridian.vantax.co.za}
      - LICENCE_FILE=${LICENCE_FILE:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
      - AUTH_MODE=${AUTH_MODE:-local}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@meridian.local}
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - ./api:/app/api
      - ./agents:/app/agents
      - ./checks:/app/checks
      - ./workers:/app/workers
      - ./db:/app/db
      - ./llm:/app/llm
      - ./sap:/app/sap
      - ./templates:/app/templates

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment: *dev-env
    volumes:
      - ./api:/app/api
      - ./agents:/app/agents
      - ./checks:/app/checks
      - ./workers:/app/workers
      - ./db:/app/db
      - ./llm:/app/llm
      - ./sap:/app/sap

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --include=dev && npm run dev"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_AUTH_MODE=${AUTH_MODE:-local}
      - PORT=3000
      - HOSTNAME=0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    networks:
      - meridian-net

  llm:
    # Disable the local LLM service in dev mode
    profiles:
      - gpu

volumes:
  frontend_node_modules:
  frontend_next_cache:
