# Development overrides — builds from source, uses Ollama Cloud, hot reload
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment: &dev-env
      - LLM_PROVIDER=ollama_cloud
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:70b}
      - OLLAMA_BASE_URL=
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=postgresql+asyncpg://vantax:${DB_PASSWORD}@db:5432/vantax
      - DATABASE_URL_SYNC=postgresql://vantax:${DB_PASSWORD}@db:5432/vantax
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vantax}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD}
      - MINIO_BUCKET_UPLOADS=${MINIO_BUCKET_UPLOADS:-vantax-uploads}
      - MINIO_BUCKET_REPORTS=${MINIO_BUCKET_REPORTS:-vantax-reports}
      - LICENCE_KEY=${LICENCE_KEY:-}
      - LICENCE_SERVER_URL=${LICENCE_SERVER_URL:-https://licence.dqagent.vantax.co.za}
      - LICENCE_FILE=${LICENCE_FILE:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
      - AUTH_MODE=${AUTH_MODE:-local}
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - ./api:/app/api
      - ./agents:/app/agents
      - ./checks:/app/checks
      - ./workers:/app/workers
      - ./db:/app/db
      - ./llm:/app/llm
      - ./templates:/app/templates

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment: *dev-env
    volumes:
      - ./api:/app/api
      - ./agents:/app/agents
      - ./checks:/app/checks
      - ./workers:/app/workers
      - ./db:/app/db
      - ./llm:/app/llm

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  llm:
    # Disable the local LLM service in dev mode
    profiles:
      - gpu
