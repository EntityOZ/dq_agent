apiVersion: v1
kind: Service
metadata:
  name: {{ include "vantax.fullname" . }}-api
  labels:
    {{- include "vantax.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    {{- include "vantax.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
